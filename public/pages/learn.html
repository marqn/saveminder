<div>
    <div class="page-header">
        <h1>Learn!</h1>
    </div>

    <div class="container text-center" ng-if="page == 'select games mode'">
        <div class="col-md-6">

        <div class="row text-center">
            <button ng-class="gameConfiguration.getHideType('hideSecond')" ng-click="gameConfiguration.setHideType('hideSecond')">
                Hide second
            </button>
            <button ng-class="gameConfiguration.getHideType('hideFirst')" ng-click="gameConfiguration.setHideType('hideFirst')">
                Hide first
            </button>
            <button ng-class="gameConfiguration.getHideType('mixed')" ng-click="gameConfiguration.setHideType('mixed')">
                Mixed
            </button>
        </div>

        <span>
            <h3>Select category:</h3>
            <input type="text">
        </span>

        <span>
            <h3>Number of words:{{gameConfiguration.numberOfWords}}</h3>
            <input type="range" min="5" max="{{allWordsNumber}}" ng-model="gameConfiguration.numberOfWords"
                   ng-model-options="{ getterSetter: true }">
        </span>


            <h3>Select mode:{{gameConfiguration.modeGame}}</h3>
            <div class="row text-center">

                <button ng-class="gameConfiguration.getModeGame('last')" ng-click="gameConfiguration.setModeGame('last')">
                    Last
                </button>

                <button ng-class="gameConfiguration.getModeGame('all')" ng-click="gameConfiguration.setModeGame('all')">
                    All
                </button>

                <button ng-class="gameConfiguration.getModeGame('random')" ng-click="gameConfiguration.setModeGame('random')">
                    Random queue
                </button>

                <button ng-class="gameConfiguration.getModeGame('raiting')" ng-click="gameConfiguration.setModeGame('raiting')">
                    Bad raiting
                </button>

                <button ng-class="gameConfiguration.getModeGame('wonder')" ng-click="gameConfiguration.setModeGame('wonder')">
                    much longer wonder
                </button>

            </div>
            <div>
                <button class="btn btn-success btn-lg" ng-click="startGame()">
                    Start
                </button>
            </div>
        </div>
        <div class="col-md-6">
            img
        </div>
    </div>

    <div ng-if="page == 'running game'">
        <div class="container text-center">
            <game-window id="gameBtn"></game-window>
        </div>

    </div>

</div>
