<div>
    <div class="page-header">
        <h1>Learn!</h1>
    </div>

    <div class="container text-center" ng-if="page == 'select games mode'">

        <span>
            <h3>Select category:</h3>
            <input type="text">
        </span>

        <span>
            <h3>Number of words:{{numberOfWords}}</h3>
            <input type="range" value="20" min="5" max="allWordsNumber"  ng-model="numberOfWords">
        </span>


        <h3>Select mode:{{mode.getModeGame()}}</h3>
        <div class="row text-center">

                <button ng-class="selectButton.getClass('last')" ng-click="mode.setModeGame('last')">
                    Last
                </button>

                <button ng-class="selectButton.getClass('all')" ng-click="mode.setModeGame('all')">
                    All
                </button>

                <button ng-class="selectButton.getClass('random')" ng-click="mode.setModeGame('random')">
                    Random queue
                </button>

                <button ng-class="selectButton.getClass('raiting')" ng-click="mode.setModeGame('raiting')">
                    Bad raiting
                </button>

                <button ng-class="selectButton.getClass('wonder')" ng-click="mode.setModeGame('wonder')">
                    much longer wonder
                </button>

        </div>
        <div>
            <button class="btn btn-success btn-lg" ng-click="startGame()">
                Start
            </button>
        </div>
    </div>

    <div ng-if="page == 'running game'">
        <div class="container text-center">
            <game-window id="gameBtn"></game-window>
        </div>

    </div>

</div>
