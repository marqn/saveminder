<div>
    <div class="page-header">
        <h1>Learn!</h1>
    </div>
    <h3>Select mode:{{mode}}</h3>
    <div class="row text-center">
        <div class="col-md-4">
            <button class="btn btn-info btn-lg" ng-click="mode = '20'">
                Last 20
            </button>
        </div>
        <div class="col-md-4">
            <button class="btn btn-info btn-lg" ng-click="mode = 'all'">
                All
            </button>

        </div>
        <div class="col-md-4">
            <button class="btn btn-info btn-lg" ng-click="mode = 'random'">
                Random queue
            </button>
        </div>
    </div>

    <div>
        <div class="container text-center">
            <game-buttons id="gameBtn"></game-buttons>
        </div>

    </div>

</div>
