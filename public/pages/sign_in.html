
    <h2>Login</h2>
    <div class="row">
        <div class="col-md-4"></div>
        <div class="col-md-4">
            <form class="form-horizontal">
                <div class="form-group">
                    <button ng-click="loginFromGoogle()" class="btn btn-danger btn-lg btn-block">Login With Google</button>
                </div>
                <div class="form-group">
                    <button ng-click="loginFromFacebook()" class="btn btn-info btn-lg btn-block">Login With Facebook</button>
                </div>

                <div class="form-group">
                    <input type="email" ng-model="email" class="form-control" id="inputEmail" placeholder="Email">
                </div>

                <div class="form-group">
                    <input type="password" ng-model="password" class="form-control" id="inputPassword" placeholder="Password">
                </div>

                <div class="form-group">
                    <div >
                        <button type="submit" class="btn btn-success btn-lg btn-block" ng-click="loggIn()">Login</button>
                    </div>
                </div>
            </form>
        </div>
        <div class="col-md-4"></div>
    </div>







    <p>
        <button ng-click="isLogged()">isLogged</button>
        <button ng-click="logout()">logout</button> <br>
    </p>
