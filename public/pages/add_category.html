<div>
    <h1>Add new category:</h1>

    <div id="alertContainer"></div>

    <form>

        <div class="form-group">
            <label for="inputCategory">Category:</label>
            <input type="first" ng-model="category" class="form-control" id="inputCategory" placeholder="...">
        </div>

        <button type="submit" ng-click="saveCategory()" class="btn btn-default">Save</button>
    </form>

</div>
