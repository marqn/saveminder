<!DOCTYPE html>
<html lang="pl" ng-app="app" ng-controller="appCtrl">
<head>
    <meta charset="utf-8">
    <title>SaveMinder - save it into your mind</title>

    <link rel="stylesheet" href="assets/bootstrap.min.css">
    <link href="http://netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap-glyphicons.css" rel="stylesheet">

    <script type="text/javascript" src="assets/angular.min.js"></script>
    <script type="text/javascript" src="assets/angular-route.min.js"></script>
    <script type="text/javascript" src="assets/angular-strap.min.js"></script>

    <!-- Firebase -->
    <script type="text/javascript" src="https://cdn.firebase.com/js/client/2.2.4/firebase.js"></script>

    <script type="text/javascript" src="https://cdn.firebase.com/libs/angularfire/1.2.0/angularfire.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/live/3.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/live/3.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/ui/0.4.0/firebase-ui-auth.js"></script>
    <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/0.4.0/firebase-ui-auth.css"/>


    <script type="text/javascript" src="js/controller.js"></script>

<body>

<nav class="navbar navbar-default" role="navigation">
    <div class="navbar-header">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#nav-toogle">
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href="#/">
            <span class="label label-primary">SaveMinder</span>
        </a>
    </div>

    <div class="collapse navbar-collapse navbar-left" id="nav-toggle_left">
        <ul class="nav navbar-nav">
            <li ng-show="userObj" ng-class="pageClass('/learn')"><a href="#/learn">Nauka</a></li>
            <li ng-show="userObj" ng-class="pageClass('/word-manager')"><a href="#/word-manager">Manager wyrazów</a></li>
        </ul>
    </div>

    <div class="collapse navbar-collapse navbar-right" id="nav-toggle">
        <ul class="nav navbar-nav">
            <li ng-hide="userObj" ng-class="pageClass('/login')"><a href="#/login">Zaloguj</a></li>
            <li ng-hide="userObj" ng-class="pageClass('/join')"><a href="#/join">Załóż konto</a></li>
            <li ng-if="userObj"><a>Zalogowany jako: {{userObj.displayName}}</a></li>
            <li ng-if="userObj"><a href="#/loggout">Wyloguj</a></li>
        </ul>
    </div>

<div class="container">
    <div ng-view></div>
