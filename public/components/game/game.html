<div class="btn-group">

    <div ng-if="sprawdz != 4">
        <h2>
            <span class="label label-primary">
                {{words[wordIndex].first | lowercase}}
            </span>
        </h2>
        <h2 ng-hide="sprawdz == 2">
            ...?...
        </h2>
        <h2 ng-show="sprawdz == 2">
            <span class="label label-success">
                {{words[wordIndex].second | lowercase}}
            </span>
        </h2>
    </div>

    <div ng-if="sprawdz == 2">
        <button type="button" class="btn btn-success" ng-click="wiem()">
            <span class="glyphicon glyphicon-ok" aria-hidden="true"></span> Wiem
        </button>
        <button type="button" class="btn btn-danger" ng-click="niewiem()">
            <span class="glyphicon glyphicon-remove" aria-hidden="true"></span> Nie wiem
        </button>
    </div>


    <div ng-if="sprawdz == 1">
        <button type="button" class="btn btn-info" ng-click="next()">
            Check
        </button>
    </div>

    <div ng-if="sprawdz == 4">
        <h1>Koniec</h1>
        <h3>Statystyka:</h3>
        <p>Ilość słówek:{{wiemCounter + niewiemCounter}}</p>
        <p>Wyuczone:{{wiemCounter}}</p>
        <p>Zapomniane:{{niewiemCounter}}</p>
        <p><button class="btn btn-primary" ng-click="startGame()">Rozpocznij jeszcze raz</button></p>
    </div>
</div>
